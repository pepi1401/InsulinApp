<script type="module">
    import { changeLanguage } from './languages.js';
    import { watchWorkout } from './workouts.js';

    // 1. Инициализация при зареждане на страницата
    window.onload = function() {
        const savedLang = localStorage.getItem("lang") || "mk";
        if (typeof changeLanguage === 'function') {
            changeLanguage(savedLang);
        }
    };

    // 2. Основна функция за клик върху тренировка
    window.toggleWorkout = function(cardElement) {
        console.log("Функцията се задейства!");

        // Отчитаме гледане САМО ако отваряме нова карта
        const isExpanded = cardElement.classList.contains('expanded');
        
        if (!isExpanded) {
            if (typeof watchWorkout === 'function') {
                watchWorkout(); // Тук се брои гледането
            }
        }

        // Логика за затваряне/отваряне
        document.querySelectorAll('.workout-card').forEach(card => {
            card.classList.remove('expanded');
        });

        if (!isExpanded) {
            cardElement.classList.add('expanded');
            setTimeout(() => {
                cardElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }
    };

    window.goToDashboard = function() {
        window.location.href = "index.html";
    };
</script>
